name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Run Evaluation

        run: |

          python scripts/run_evals.py

      - name: Deployment Gate

        run: |

          python scripts/check_gate.py

      - name: Run Evaluation Suite

         run: |

          python scripts/run_evaluations.py

      - name: Validate Deployment Gate

         run: |
          python scripts/check_deployment_gate.py

      - name: Lint code
        run: |
          pip install flake8
          flake8 app/
      

  build:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t advisor-copilot:latest .