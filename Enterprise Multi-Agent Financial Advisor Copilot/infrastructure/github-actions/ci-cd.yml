name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Lint code
        run: |
          pip install flake8
          flake8 app/

  build:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t advisor-copilot:latest .