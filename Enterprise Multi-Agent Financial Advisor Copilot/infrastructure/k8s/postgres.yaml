apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres

spec:

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:

    metadata:
      labels:
        app: postgres

    spec:

      containers:

        - name: postgres

          image: postgres:16

          env:
            - name: POSTGRES_DB
              value: advisor_db

            - name: POSTGRES_USER
              value: advisor

            - name: POSTGRES_PASSWORD
              value: advisor123